name: Required Check / Launch Gates

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main

jobs:
  launch-gates-required:
    name: launch-gates-required
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scu
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
      PRISMA_CLIENT_ENGINE_TYPE: 'library'
      PGPASSWORD: 'password'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Inject Physical .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/scu" > packages/database/.env

      - name: Generate Prisma Client (npx explicit)
        run: |
          rm -rf packages/database/src/generated
          npx prisma generate --schema=./packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scu

      - name: Build Database Package (Force)
        run: |
          pnpm --filter database build

      - name: Push DB Schema
        run: |
          npx prisma db push --schema=./packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scu

      - name: Build Services
        run: |
          pnpm turbo build --filter=api --filter=@scu/worker --no-cache

      - name: Start Services (Background)
        run: |
          mkdir -p .data/logs .data/pids

          # Start API
          export DATABASE_URL="postgresql://postgres:password@localhost:5432/scu"
          export PORT=3000
          export API_PORT=3000
          export NODE_ENV=staging
          export JWT_SECRET="dummy-secret-for-ci"
          export REDIS_URL="redis://localhost:6379"
          nohup pnpm --filter api start > .data/logs/api.log 2>&1 &
          echo $! > .data/pids/api.pid

          # Start Worker
          export NODE_ENV=staging
          export API_URL="http://localhost:3000"
          export WORKER_PORT=3001
          nohup pnpm --filter worker start > .data/logs/worker.log 2>&1 &
          echo $! > .data/pids/worker.pid

          # Wait for API health
          echo "Waiting for API on port 3000..."
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:3000/health; then
              echo "API is ready."
              break
            fi
            echo "Waiting... $i/30"
            sleep 2
          done

      - name: Run Launch Gates (CI Mode + P6-2)
        run: |
          # CI Mode triggers Local-like subset strictly
          bash tools/gate/run_launch_gates.sh
        env:
          GATE_ENV_MODE: ci
          API_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scu
          P6_2: '1' # Explicitly enable P6-2

      - name: Upload Evidence Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-evidence-report
          path: |
            docs/_evidence/run_launch_gates_*
            .data/logs/api.log
            .data/logs/worker.log
