name: Required Check / Launch Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  launch-gates-required:
    name: launch-gates-required
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scu
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
      PRISMA_CLIENT_ENGINE_TYPE: 'library'
      PRISMA_CLI_QUERY_ENGINE_TYPE: 'library'
      PGUSER: 'postgres'
      PGPASSWORD: 'password'
      PGHOST: '127.0.0.1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'
          cache: 'pnpm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg postgresql-client

      - name: Install dependencies (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Inject Physical .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@127.0.0.1:5432/scu" > packages/database/.env

      - name: Generate Prisma Client (npx explicit)
        run: |
          rm -rf packages/database/src/generated
          npx prisma generate --schema=./packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/scu
          PRISMA_CLI_QUERY_ENGINE_TYPE: library

      - name: Build Database Package (Force)
        run: |
          pnpm --filter database build

      - name: Push DB Schema
        run: |
          npx prisma db push --schema=./packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/scu

      - name: Rigid DB Seeding (Fallback)
        run: |
          echo "Seeding user-gate, gate-org and ak_smoke_test_key_v1 via psql..."
          psql "postgresql://postgres:password@127.0.0.1:5432/scu" -c "
            INSERT INTO \"users\" (id, email, \"passwordHash\", role, \"createdAt\", \"updatedAt\") 
            VALUES ('user-gate', 'gate@example.com', 'dummy-hash', 'ADMIN', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
            ON CONFLICT (id) DO NOTHING;
            
            INSERT INTO \"organizations\" (id, name, \"ownerId\", \"createdAt\", \"updatedAt\")
            VALUES ('gate-org', 'Gate Organization', 'user-gate', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
            ON CONFLICT (id) DO NOTHING;
            
            INSERT INTO \"api_keys\" (id, key, \"ownerOrgId\", \"ownerUserId\", name, status, \"createdAt\", \"updatedAt\")
            VALUES ('api_key_gate', 'ak_smoke_test_key_v1', 'gate-org', 'user-gate', 'Smoke Gate Key', 'ACTIVE', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
            ON CONFLICT (id) DO NOTHING;
          "

      - name: Build Services
        run: |
          pnpm turbo build --filter=api --filter=@scu/worker --no-cache
          # Verify structure
          ls -l apps/api/dist/apps/api/src/main.js || (echo "ERROR: nested main.js not found, checking alternatives..." && ls -R apps/api/dist)

      - name: Start Services (Background)
        run: |
          mkdir -p .data/logs .data/pids

          # Start API
          export DATABASE_URL="postgresql://postgres:password@127.0.0.1:5432/scu"
          export PRISMA_CLIENT_ENGINE_TYPE=library
          export PORT=3000
          export API_PORT=3000
          export NODE_ENV=staging
          export JWT_SECRET="dummy-secret-for-ci"
          export API_SECRET_KEY="dummy-api-secret-key-for-ci-32chars-min"
          export HMAC_SECRET_KEY="dummy-hmac-secret-key-for-ci-32chars-min"
          export REDIS_URL="redis://127.0.0.1:6379"
          nohup pnpm --filter api start > .data/logs/api.log 2>&1 &
          echo $! > .data/pids/api.pid

          # Start Worker
          export PRISMA_CLIENT_ENGINE_TYPE=library
          export NODE_ENV=staging
          export API_URL="http://127.0.0.1:3000"
          export WORKER_PORT=3001
          nohup pnpm --filter @scu/worker start > .data/logs/worker.log 2>&1 &
          echo $! > .data/pids/worker.pid

          # Wait for API health
          echo "Waiting for API on port 3000..."
          for i in $(seq 1 45); do
            if curl -s http://127.0.0.1:3000/health; then
              echo "API is ready."
              break
            fi
            echo "Waiting... $i/45"
            sleep 2
          done

          # Wait for WORKER boot
          echo "Waiting for WORKER boot..."
          for i in $(seq 1 10); do
            if grep -q "WORKER_BOOT" .data/logs/worker.log 2>/dev/null; then
              echo "WORKER booted successfully."
              break
            fi
            sleep 1
          done

          # Debug Startup
          echo "--- Last 50 lines of API log ---"
          cat .data/logs/api.log | tail -n 50 || echo "API log missing"
          echo "--- Startup WORKER log (Head) ---"
          cat .data/logs/worker.log | head -n 100 || echo "WORKER log missing"

      - name: Run Launch Gates (CI Mode + P6-2)
        run: |
          # CI Mode triggers Local-like subset strictly
          EXIT_CODE=0
          bash tools/gate/run_launch_gates.sh || EXIT_CODE=$?

          echo "==============================================="
          echo "--- Full WORKER log for Claim traces ---"
          cat .data/logs/worker.log || echo "WORKER log missing"
          echo "==============================================="

          exit $EXIT_CODE
        env:
          GATE_ENV_MODE: ci
          API_URL: http://127.0.0.1:3000
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/scu
          PRISMA_CLIENT_ENGINE_TYPE: library
          API_KEY: ak_smoke_test_key_v1
          P6_2: '1' # Explicitly enable P6-2

      - name: Upload Evidence Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-evidence-report
          path: |
            docs/_evidence/run_launch_gates_*
            .data/logs/api.log
            .data/logs/worker.log
