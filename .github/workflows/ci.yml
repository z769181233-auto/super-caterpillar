name: ci
on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
      PRISMA_CLIENT_ENGINE_TYPE: 'binary'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Inject Physical .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/testdb" > packages/database/.env

      - name: Generate Prisma Client (npx explicit + clean)
        run: |
          rm -rf packages/database/src/generated
          # Prisma 7 兼容性修正：使用环境变量显式覆盖并忽略迁移限制。认识。
          export PRISMA_CLIENT_ENGINE_TYPE=binary
          npx prisma generate --schema=./packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

      - name: Turbo build
        run: pnpm turbo run build --cache-dir=.turbo --continue

      - name: Turbo test
        run: pnpm turbo run test --cache-dir=.turbo --continue
