name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Inject Physical .env for Prisma
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/testdb" > packages/database/.env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/testdb" > .env

      - name: Generate Prisma Client (npx explicit + clean)
        run: |
          rm -rf packages/database/src/generated
          npx prisma generate --schema=./packages/database/prisma/schema.prisma

      - name: Turbo build
        run: pnpm turbo run build --cache-dir=.turbo --continue

      - name: Turbo test
        run: pnpm turbo run test --cache-dir=.turbo --continue
