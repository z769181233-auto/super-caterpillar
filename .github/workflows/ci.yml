name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  preflight:
    name: Preflight Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Preflight check
        run: pnpm run preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: |
          pnpm run lint
          pnpm -C apps/web lint:strict
      - name: Build Web App
        run: pnpm -C apps/web build

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm run test

  contract:
    name: Contract Gate
    runs-on: ubuntu-latest
    needs: [preflight, typecheck]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter database prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Run contract tests
        run: pnpm run test:contract
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          TEST_API_KEY: test-key
          TEST_API_SECRET: test-secret

  smoke:
    name: Runtime Gate (Smoke)
    runs-on: ubuntu-latest
    needs: [preflight, typecheck, test]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter database prisma:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Build API
        run: pnpm --filter api build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Start API (background)
        run: |
          pnpm --filter api start &
          sleep 10
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NODE_ENV: test
      - name: Run smoke tests
        run: pnpm run smoke
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          API_BASE_URL: http://localhost:3000
          API_KEY: test-key
          API_SECRET: test-secret
