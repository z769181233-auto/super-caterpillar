name: required-p6-release-readiness

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  p6-release-readiness:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: scu
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d scu"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout (fetch tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d scu && exit 0
            sleep 2
          done
          exit 1
        env:
          PGPASSWORD: postgres

      - name: Shell safety redline audit
        run: |
          bash tools/gate/gates/gate-audit_shell_safety_redline.sh

      - name: Run P6 release readiness gates
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scu
          # Generate evidence in runner temp directory (CI doesn't write back to repo)
          EVI_OVERRIDE: /tmp/p6_release_readiness_evidence
        run: |
          bash tools/run_p6_release_readiness.sh
          test -f /tmp/p6_release_readiness_evidence/EVIDENCE_INDEX.json
          test -f /tmp/p6_release_readiness_evidence/SHA256SUMS.txt
          shasum -a 256 -c /tmp/p6_release_readiness_evidence/SHA256SUMS.txt
          shasum -a 256 -c /tmp/p6_release_readiness_evidence/EVIDENCE_INDEX.sha256

      - name: Ensure repo unchanged after gates
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Upload P6 evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: p6_release_readiness_evidence
          path: /tmp/p6_release_readiness_evidence
          if-no-files-found: error
