name: security-scan
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dep_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod

      - name: OSV scan
        uses: google/osv-scanner-action@v2.3.3
        with:
          scan-args: |-
            -r
            .
