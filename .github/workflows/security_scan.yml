name: security-scan
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dep_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # pnpm audit：作为快速门禁
      - name: pnpm audit
        run: pnpm audit --prod

      # OSV：更贴近 GitHub Advisory / CVE 生态
      - name: osv-scanner
        uses: google/osv-scanner-action@v1.8.0
        with:
          scan-args: |-
            -r
            .
