name: sbom
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 使用 npx 直接运行 CycloneDX 工具以避免 pnpm 安装环境干扰
      - name: Generate SBOM (CycloneDX)
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --output-format JSON

      # 执行审计级校验 (jq 确认 bomFormat 字段)
      - name: Validate SBOM (basic)
        run: |
          jq '.bomFormat' sbom.cdx.json | grep -q CycloneDX && echo "SBOM valid: CycloneDX format confirmed" || exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30
