name: Stage4 Nightly 3M Baseline Gate (Required)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  stage4-nightly-3m:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: corepack enable && pnpm -v && pnpm i --frozen-lockfile

      - name: Run Gate (3M baseline) + Capture Evidence
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HMAC_SECRET_KEY: ${{ secrets.HMAC_SECRET_KEY }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
          MIN_CHUNK_JOBS: "5"
          MAX_FAILED_JOBS: "0"
        run: |
          # P6-0 Harden: Enforce strict failure and audit summary
          set -euo pipefail
          TS="$(date +%Y%m%d_%H%M%S)"
          EVI="docs/_evidence/stage4_nightly_3m_${TS}"
          mkdir -p "$EVI"

          echo "EVIDENCE_DIR=$EVI" | tee "$EVI/evidence_dir.txt"
          echo "### Stage4 Nightly 3M Evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "- Evidence Location: \`$EVI\`" >> "$GITHUB_STEP_SUMMARY"

          # [EXECUTION]
          bash tools/gate/gates/gate_stage4_scaling_15m.sh | tee "$EVI/run.log"

          # [AUDIT: Metrics]
          # API metrics snapshot must exist; if port 3000 is down -> exit 1
          curl -fsS http://localhost:3000/metrics > "$EVI/metrics_snapshot.txt"

          # [ASSERT: Pass Logic]
          # final_summary.json MUST exist and must be marked as PASS
          if [ ! -f "$EVI/final_summary.json" ]; then
            echo "❌ CRITICAL: final_summary.json not found. Gate protocol violation." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          if ! grep -q '"status"[[:space:]]*:[[:space:]]*"PASS"' "$EVI/final_summary.json"; then
            echo "❌ CRITICAL: 3M Baseline FAILED. Blocking Release." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # [ASSERT: Traceability]
          # input.sha256 must exist to prove we ran against the correct baseline
          if [ ! -f "$EVI/input.sha256" ]; then
            echo "❌ AUDIT WARNING: input.sha256 missing." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ 3M Baseline PASS. Evidence archived." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: stage4-nightly-3m-evidence
          path: docs/_evidence/stage4_nightly_3m_*
