groups:
- name: stage4-alerts
  rules:
  - alert: Stage4AnyFailedJobs
    expr: increase(scu_stage4_failed_jobs_total[5m]) > 0
    for: 0m
    labels:
      severity: critical
    annotations:
      summary: "Stage4 failed jobs detected"
      description: "Stage4 has failed jobs in last 5m (increase > 0)."

  - alert: Stage4PeakRssTooHigh
    expr: max_over_time(scu_stage4_peak_rss_mb[10m]) > 3000
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Stage4 RSS too high"
      description: "Peak RSS exceeded 3000MB for 2m."

  - alert: Stage4DurationRegression
    expr: (
      histogram_quantile(0.95, sum(rate(scu_stage4_duration_seconds_bucket[30m])) by (le))
      /
      histogram_quantile(0.95, sum(rate(scu_stage4_duration_seconds_bucket[24h])) by (le))
    ) > 1.30
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Stage4 duration regression"
      description: "p95 duration is >30% worse than 24h baseline."
